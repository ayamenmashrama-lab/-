<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مختبر أيمن مشرحة</title>
    
    <link rel="stylesheet" href="./style.css">
    
    <style>
        /* تنسيق سريع ومؤقت للتأكد من عمل الصفحة بنجاح */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            text-align: center;
            padding: 50px 20px;
            margin: 0;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            color: #007bff;
        }
        p {
            font-size: 18px;
            line-height: 1.6;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>تم تشغيل الموقع بنجاح! 🎉</h1>
        <p>إذا كنت ترى هذه الصفحة الآن، فهذا يعني أن مشكلة الصفحة البيضاء قد حُلت تماماً، وأن اتصال الملفات بسيرفر GitHub Pages يعمل بشكل سليم.</p>
        <p>يمكنك الآن البدء في تعديل هذا الكود وإضافة محتوى مشروعك الطبي أو البرمجي كما تحب.</p>
    </div>
</body>
</html>
